<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Power Token Wallboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <link rel="stylesheet" href="style9.css">
</head>
<body class="p-8 flex flex-col">

    

    <header class="flex justify-between items-center mb-2 xl:mb-6">
        <div class="flex items-center">
            <div class="flex-shrink-0 h-16 w-14  xl:h-20 xl:w-24">
            <img src="./assets/NewLogo2.png" alt="Power Tokens Logo" class="h-full w-full object-contain">
             </div>
            <div>
                <h1 class="text-3xl xl:text-5xl font-black tracking-tight text-slate-800 uppercase italic">Power Tokens</h1>
                <p class="text-blue-600 font-bold uppercase tracking-widest text" id="current-season">Monthly Celebration</p>
            </div>
        </div>
        
        <div class="flex flex-col items-end">
            <div class="big-number" id="total-count-display">0</div>
            <div class="text-slate-500 uppercase tracking-widest font-black text-md" id="goal-display">/1000</div>
        </div>

        <div class="flex flex-col items-center justify-center overflow-hidden hidden">
            <div class="relative w-full aspect-square max-w-[120px]">
                <canvas id="progressChart"></canvas>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="text-3xl font-black text-slate-800" id="percentage-label">0%</span>
                </div>
            </div>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-6 flex-1 min-h-0">

        <div id="lottie-celebration-container" class="absolute inset-0 z-0 opacity-0 transition-opacity duration-300 pointer-events-none">>
                <dotlottie-player 
                            id="electric-lottie"
                            src="./assets/EVFinalConfeti.lottie" 
                            background="transparent" 
                            speed="1" 
                            style="width: 100%; height: 100%;" 
                            direction="1" 
                            playMode="normal" 
                            loop 
                            autoplay>
                 </dotlottie-player>
         </div>


        <div class="col-span-4 card-pop p-6 xs:p-4 xl:p-8 relative overflow-hidden flex items-center justify-center">
            <h2 class="text-2xl xl:text-3xl font-black  mb-4 xl:mb-8 text-slate-700 uppercase tracking-tight flex items-center gap-3">
                <span class="w-4 h-4 bg-blue-400 rounded-full animate-pulse"></span>
                Power Reservoir
            </h2>
            
            <div class="jar-group relative h-full w-full flex items-center justify-center">      

                <div id="lottie-bg-container" class="absolute inset-0 z-100" style="opacity: 40%;">
                <dotlottie-player 
                            id="electric-lottie"
                            src="./assets/Glowing sparks.lottie" 
                            background="transparent" 
                            speed=".8" 
                            style="width: 100%; height: 90%;" 
                            direction="2" 
                            playMode="normal" 
                            loop 
                            autoplay>
                 </dotlottie-player>
               </div>

                <div id="lottie-filling-container" class="absolute inset-0 z-50 opacity-0">

                <dotlottie-player 
                            id="electric-spark2"
                            src="./assets/Level Up Confetti Animation.lottie" 
                            background="transparent" 
                            speed=".8" 
                            style="width: 100%; height: 100%;" 
                            direction="1" 
                            playMode="normal" 
                            loop 
                            autoplay>
                 </dotlottie-player>
               </div>
                <img src="./assets/Jar-0.png" alt="back_jar" class="jar background-jar" id="jar-background">
                <div class="jar-mask-container">
                        <dotlottie-player 
                            id="neon-sparks-lottie"
                            src="./assets/neon-lightning.lottie" 
                            background="transparent" 
                            speed=".8" 
                            style="width: 100%; height: 100%;" 
                            loop 
                            autoplay>
                        </dotlottie-player>
                    </div>
                <img src="./assets/Front-Jar-2.png" alt="front_jar" class="jar front-jar">

                <div id="coin-spawn-area"></div>
            </div>
        </div>

        <div class="col-span-8 card-pop p-6 xs:p-4 xl:p-8  flex flex-col h-full overflow-hidden">
            <h2 class="text-2xl xl:text-3xl  font-black mb-4 xl:mb-8 text-slate-700 uppercase tracking-tight flex items-center gap-3">
                <span class="w-4 h-4 bg-blue-400 rounded-full animate-pulse"></span>
                Freshly Awarded!
            </h2>
            
            <div id="recent-list">
                <div class="text-slate-300 text-center py-10 italic font-bold text-5xl">
                    Listening for good vibes...
                </div>
            </div>
        </div>

    </main>

    <div id="status-controls">
        <button id="sound-toggle-btn" type="button" onclick="toggleSound()">Enable Sound</button>
        <div id="last-updated">Last updated: --</div>
    </div>

   <script src="app4.js" defer></script>
</body>
</html>
